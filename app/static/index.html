  <!-- ---------- view templates ---------- -->

  <template id="tpl-overview">
    <div class="stack">
      <div class="banner">
        <div class="banner-text">
          <div class="banner-eyebrow">what this demo does · IDBI hackathon</div>
          <h2>KYC once. Share across banks. Prove one field at a time. Revoke the whole book on a sanctions update — all with zero PII on-chain, aligned to RBI Master Direction &amp; DPDP Act.</h2>
          <p>Pick a <a href="#/scenarios">scenario</a> to run an onboarding variant, watch decisions stream in real time, drill into any customer record from <a href="#/credentials">Credentials</a>, or inspect the reviewer queue from <a href="#/reviews">Review queue</a>. Ask the assistant (⌘/) any time.</p>
        </div>
        <button class="btn primary" id="banner-go">Run a scenario →</button>
      </div>

      <div class="two-col">
        <div class="card">
          <div class="card-head"><h3>Why this matters for IDBI</h3></div>
          <ul class="invariants">
            <li><b>Re-KYC cost eliminated.</b> Customer KYC'd by IDBI is re-usable by any partner bank or fintech that trusts the anchored root — no repeat document capture.</li>
            <li><b>Escape rate = direct fraud liability.</b> Every wrong field auto-accepted is a compliance exposure the bank owns. This demo bounds it at 0%.</li>
            <li><b>DPDP Act clean.</b> Nothing personal is written on-chain, encrypted or otherwise. An encrypted blob on an immutable ledger is a breach with a delay fuse.</li>
            <li><b>RBI-friendly audit trail.</b> Every issuance and revocation is an on-chain event; a regulator can verify what happened without asking the bank for logs.</li>
            <li><b>Instant sanction sweep.</b> Revoking 100,000 customers on a new PMLA list is one transaction from the bank; free for the customer to be revoked.</li>
          </ul>
        </div>
        <div class="card">
          <div class="card-head"><h3>Design invariants</h3></div>
          <ul class="invariants">
            <li><b>32 bytes on-chain per epoch.</b> Whatever the customer count.</li>
            <li><b>Zero personal data anchored.</b> Only Merkle roots.</li>
            <li><b>Fresh 128-bit salt per field.</b> Undisclosed ≠ guessable.</li>
            <li><b>Monotonic revocation version.</b> No rollback to a "still valid" list.</li>
            <li><b>Gate is deterministic.</b> LLMs only around the edges.</li>
          </ul>
        </div>
      </div>

      <div class="kpi-grid">
        <div class="kpi"><div class="kpi-num" data-k="epochs">—</div><div class="kpi-lbl">Epochs anchored</div><div class="kpi-sub">one tx per epoch, any size</div></div>
        <div class="kpi"><div class="kpi-num" data-k="credentials">—</div><div class="kpi-lbl">Credentials issued</div><div class="kpi-sub">salted Merkle leaves</div></div>
        <div class="kpi"><div class="kpi-num" data-k="escape_rate">—</div><div class="kpi-lbl">Escape rate</div><div class="kpi-sub">wrong fields accepted, weighted</div></div>
        <div class="kpi"><div class="kpi-num" data-k="cost">—</div><div class="kpi-lbl">Total on-chain cost</div><div class="kpi-sub">USD, anchors + revocations</div></div>
      </div>

      <div class="card">
        <div class="card-head">
          <h3>Epochs</h3>
          <span class="muted">Newest first · click a row to see its credentials</span>
        </div>
        <div class="table-wrap">
          <table class="tbl" id="epochs-table">
            <thead><tr>
              <th>Epoch</th><th>Anchored</th><th>Credentials</th><th>Reviewed</th>
              <th>Escape rate</th><th>Revoked</th><th>Gas</th><th>Cost</th><th>Tx</th>
            </tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h3>Chain activity</h3><span class="muted">last 20 transactions on Base — anchors and revocation publishes</span></div>

  <template id="tpl-scenarios">
    <div class="stack">
      <div class="card">
        <div class="card-head">
          <h3>Pick a scenario</h3>
          <span class="muted">Each preset shifts the OCR quality, MRZ readability, or attacker behaviour. Click to load, tweak, and run.</span>
        </div>
        <div class="scen-grid" id="scen-grid"></div>
      </div>

      <div class="two-col">
        <div class="card">
          <div class="card-head">
            <h3 id="scen-selected">No scenario selected</h3>
            <span class="muted" id="scen-selected-sub"></span>
          </div>
          <p class="scen-desc" id="scen-desc">Pick a card above to configure a run.</p>
          <div class="scen-form" id="scen-form" hidden>
            <label>Documents
              <input id="scen-n" type="number" min="5" max="1000" value="60" />
            </label>
            <label>Seed
              <input id="scen-seed" type="number" value="" placeholder="random" />
            </label>
            <label>CER multiplier
              <input id="scen-cer" type="number" step="0.1" min="0" max="10" value="1.0" />
              <span class="hint">multiplies all field CERs; 1.0 = as reported, 0.1 = 10× better</span>
            </label>
            <label>Address CER
              <input id="scen-addr" type="number" step="0.001" min="0" max="0.5" value="0.079" />
              <span class="hint">the hardest field; drives review rate</span>
            </label>
            <label>MRZ readable rate
              <input id="scen-mrz" type="number" step="0.05" min="0" max="1" value="0.94" />
              <span class="hint">1.0 = MRZ always parses; 0.0 = fully blown out</span>
            </label>
            <label>Date-swap attack rate
              <input id="scen-swap" type="number" step="0.01" min="0" max="1" value="0.02" />
              <span class="hint">fraction of docs where expiry ↔ issue swap</span>
            </label>
            <label>Engine correlation
              <input id="scen-corr" type="number" step="0.05" min="0" max="1" value="0.35" />
              <span class="hint">how much of engine B errors match engine A</span>
            </label>
            <label>Pipeline pacing (ms/stage)
              <input id="scen-pace" type="number" min="0" max="1000" step="20" value="140" />
              <span class="hint">0 = as fast as CPU allows; 140 = follow along; 400 = teach a judge</span>
            </label>
            <label class="chk">
              <input id="scen-anchor" type="checkbox" checked />
              Anchor accepted credentials into a new epoch
            </label>
            <div class="scen-actions">
              <button class="btn primary" id="scen-run">Run scenario</button>
              <button class="btn ghost" id="scen-stop" disabled>Stop</button>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-head">
            <h3>What this scenario predicts</h3>
            <span class="muted">Compare against live counters below</span>
          </div>
          <div class="expect" id="scen-expect">
            <em class="muted">Select a scenario to see its expected behaviour.</em>
          </div>
          <div class="run-counters">
            <div class="counter"><div class="counter-lbl">Auto-accepted</div><div class="counter-val" id="c-accept">0</div></div>
            <div class="counter warn"><div class="counter-lbl">Reviewed</div><div class="counter-val" id="c-review">0</div></div>
            <div class="counter bad"><div class="counter-lbl">Recapture</div><div class="counter-val" id="c-recap">0</div></div>
            <div class="counter"><div class="counter-lbl">Raw field acc</div><div class="counter-val" id="c-raw">—</div></div>
            <div class="counter good"><div class="counter-lbl">Escape rate</div><div class="counter-val" id="c-esc">0.0000%</div></div>
          </div>
        </div>
      </div>

      <div class="card" id="run-progress-card" hidden>
        <div class="card-head">
          <h3>Pipeline — live</h3>
          <span class="muted" id="run-progress-txt">idle</span>
        </div>

        <!-- Pipeline graph: 6 stage nodes with pulsing edges -->
        <svg id="pipeline-svg" viewBox="0 0 900 130" preserveAspectRatio="xMidYMid meet"></svg>

        <div class="run-bar-track"><div class="run-bar-fill" id="run-bar"></div></div>

        <div class="cot-row">
          <div class="cot-panel">
            <div class="cot-head">
              <h4>Chain of thought</h4>
              <span class="muted" id="cot-doc">—</span>
            </div>
            <div class="cot-stream" id="cot-stream"></div>
          </div>
          <div class="doc-panel">
            <div class="cot-head">
              <h4>Current document — data transparency</h4>
              <span class="muted" id="doc-panel-status">—</span>
            </div>
            <div class="doc-inspect" id="doc-inspect">
              <em class="muted">A document's per-field ground truth, OCR reads, and gate decision will appear here as the pipeline processes it.</em>
            </div>
          </div>
        </div>
      </div>

      <div class="card" id="live-table-card" hidden>
        <div class="card-head"><h3>All decisions so far</h3><span class="muted">click any row to inspect that document</span></div>
        <div class="table-wrap max-h">
          <table class="tbl compact" id="live-table">
            <thead><tr>
              <th>#</th><th>Doc ID</th><th>Customer</th><th>Action</th><th>Reviewed fields</th><th>Latency</th>
            </tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div class="card" id="run-anchor-card" hidden>
        <div class="card-head"><h3>Anchor receipt</h3><span class="muted">the only bytes that touched the chain</span></div>
        <div class="receipt-grid" id="run-anchor-receipt"></div>
      </div>
    </div>
  </template>

  <template id="tpl-studio">
    <div class="stack">
      <div class="card">
        <div class="card-head">
          <h3>Studio — agentic workflow builder</h3>
          <span class="muted">Compose banking capabilities into a KYC workflow. Ask the copilot to draft one from a plain-language brief, or start from a saved preset. Run it live against a synthetic customer.</span>
        </div>

        <div class="studio-cols">
          <!-- LEFT: Copilot + presets -->
          <div class="studio-left">
            <div class="studio-block">
              <h4>Copilot</h4>

                <button class="chip" data-msg="Re-KYC an existing retail customer: verify address and re-anchor.">Re-KYC</button>
                <button class="chip" data-msg="Onboard an NRI opening an NRE account: PAN, address, PEP check, enhanced AML, sanctions.">NRI onboarding</button>
                <button class="chip" data-msg="High-risk onboarding pipeline with document classification, all validators, PEP, sanctions and AML risk score.">High-risk full stack</button>
              </div>
              <div class="copilot-out" id="copilot-out"></div>
            </div>

            <div class="studio-block">
              <h4>Presets</h4>
              <div class="preset-list" id="preset-list"></div>
            </div>

            <div class="studio-block">
              <h4>Capabilities palette</h4>
              <p class="muted" style="margin: 0 0 8px">The building blocks the copilot composes.</p>
              <div class="cap-palette" id="cap-palette"></div>
            </div>
          </div>

          <!-- RIGHT: Workflow diagram + run -->

            <div class="studio-block">
              <div class="wf-head">
                <div>
                  <div class="wf-name" id="wf-name">No workflow loaded</div>
                  <div class="muted" id="wf-desc">Pick a preset on the left or ask the copilot to generate one.</div>
                </div>
                <div class="wf-actions">
                  <select id="wf-record-kind">
                    <option value="retail">Retail record</option>
                    <option value="corporate">Corporate record</option>
                  </select>
                  <button class="btn ghost" id="wf-save" disabled>Save preset</button>
                  <button class="btn primary" id="wf-run" disabled>Run workflow</button>
                </div>
              </div>
              <svg id="wf-svg" viewBox="0 0 900 320" preserveAspectRatio="xMidYMid meet"></svg>

              <!-- Manual node editor -->
              <div class="wf-editor">
                <div class="wf-editor-row">
                  <label class="wf-editor-lbl">Add node
                    <select id="wf-add-cap"></select>
                  </label>
                  <label class="wf-editor-lbl">After
                    <select id="wf-add-after"></select>
                  </label>
                  <button class="btn ghost" id="wf-add-btn" disabled>+ Add</button>
                  <label class="wf-editor-lbl">Remove
                    <select id="wf-rm-node"></select>
                  </label>
                  <button class="btn ghost" id="wf-rm-btn" disabled>× Remove</button>
                </div>
                <div class="wf-editor-row">
                  <label class="wf-editor-lbl grow">Refine with copilot
                    <input id="wf-refine-input" type="text" placeholder='e.g. "add IFSC check between PAN and address"' />
                  </label>
                  <button class="btn" id="wf-refine-btn" disabled>✦ Refine</button>
                </div>
              </div>
            </div>

            <!-- Upload data -->
            <div class="studio-block">
              <h4>Upload customer data</h4>
              <p class="muted" style="margin: 0 0 8px">Provide a CSV of customer rows. The workflow above will run on every row and you can download a compliance-ready PDF.</p>
              <div class="wf-upload">

            <div class="studio-block" id="wf-record-block" hidden>

            </div>

            <div class="studio-block" id="wf-log-block" hidden>
              <h4>Per-node results</h4>

            </div>

            <div class="studio-block" id="wf-final-block" hidden>

  <template id="tpl-adjudicator">
    <div class="stack">
      <div class="card">
        <div class="card-head">
          <h3>VLM Adjudicator — third opinion before a human sees the file</h3>
          <span class="muted">Instead of routing the ~5% edge cases to a KYC officer, the gate asks a fresh model (Gemini) that has never seen the two OCR engines' shared glare artefacts. Human review only if it also abstains.</span>
        </div>
        <div class="adj-form">
          <label>Field
            <select id="adj-field">
              <option value="date_of_birth">date_of_birth</option>
              <option value="name">name</option>
              <option value="nationality">nationality</option>
              <option value="id_no">id_no</option>
              <option value="date_of_expiry">date_of_expiry</option>
            </select>
          </label>
          <label>Validator
            <select id="adj-validator">
              <option value="date">date</option>
              <option value="text">text</option>
              <option value="id_regex">id_regex</option>
            </select>
          </label>
          <label>Engine A read
            <input id="adj-a" value="1997-10-28" />
          </label>
          <label>Engine A confidence
            <input id="adj-conf" type="number" min="0" max="1" step="0.01" value="0.72" />
          </label>
          <label>Engine B read
            <input id="adj-b" value="1937-10-28" />
          </label>
          <label>MRZ evidence
            <input id="adj-mrz" value="1997-10-28" />
          </label>
        </div>
        <div class="adj-actions">
          <button class="btn primary" id="run-adj">Ask the VLM</button>
          <button class="btn ghost" id="load-real-adj" title="Pick a real reviewed field from an epoch">Load one from review queue</button>
        </div>
        <div class="adj-result" id="adj-result">
          <em class="muted">Fill in two disagreeing OCR reads. The VLM will pick the more plausible one, or abstain.</em>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h3>How the adjudicator fits</h3></div>
        <ol class="steps">
          <li><b>Schema</b> validates the value. If it fails outright, the field goes to review — no adjudicator call.</li>
          <li><b>Agreement</b> + <b>confidence</b> pass the field if both engines produce the same canonical value and confidence clears threshold.</li>
          <li>If the field is in the <b>MRZ</b>, the check digit rules the tie. The adjudicator is not called.</li>
          <li>Only when nothing above resolved it does the gate call the adjudicator — a fresh model that has never seen the two engines' shared glare artefacts.</li>
          <li>If the adjudicator's value passes the validator AND matches one of the engines' canonical output, the field is accepted with signal <code>adjudicator: true</code>. Otherwise the field escalates to review.</li>
        </ol>
      </div>
    </div>
  </template>

  <template id="tpl-audit">
    <div class="stack">
      <div class="two-col">
        <div class="card">
          <div class="card-head">
            <h3>Compliance audit report</h3>
            <button class="btn primary" id="run-report">Generate</button>
          </div>
          <div class="report" id="audit-report"><em class="muted">Click Generate to produce a grounded report from current state.</em></div>
        </div>
        <div class="card">
          <div class="card-head"><h3>Revocation timeline</h3></div>
          <ul class="timeline" id="rev-timeline"></ul>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h3>All chain transactions</h3></div>
        <div class="table-wrap max-h">
          <table class="tbl">
            <thead><tr>
              <th>Kind</th><th>Epoch</th><th>Version</th><th>Root / list hash</th><th>Gas</th><th>Anchored</th><th>Tx</th>
            </tr></thead>
            <tbody id="tx-table"></tbody>
          </table>
        </div>
      </div>
    </div>
  </template>

  <!-- ---------- drawer sub-templates ---------- -->

  <template id="tpl-drawer-credential">
    <div class="drawer-section">
      <div class="drawer-kvs" id="cred-kvs"></div>
      <div class="drawer-actions">
        <button class="btn ghost" id="drawer-copy-did">Copy subject DID</button>
        <button class="btn danger" id="drawer-revoke">Revoke</button>
      </div>
    </div>

    <div class="drawer-section">
      <h4>Fields &amp; decisions</h4>
      <table class="tbl compact drawer-fields">
        <thead><tr><th>Field</th><th>Value</th><th>Truth</th><th>Signals</th><th></th></tr></thead>
        <tbody id="drawer-fields-body"></tbody>
      </table>
      <div class="signal-legend">
        <span class="muted">Signals:</span>
        <span class="signal ok">s</span> schema
        <span class="signal ok">a</span> agreement
        <span class="signal ok">c</span> confidence
        <span class="signal ok">m</span> MRZ
        <span class="signal ok">j</span> adjudicator
      </div>
    </div>

    <div class="drawer-section">
      <h4>Selective disclosure</h4>
      <p class="muted">Pick which fields to reveal. Nothing about withheld fields will appear in the presentation.</p>
      <div class="reveal-grid" id="drawer-reveal"></div>
      <div class="drawer-actions">
        <button class="btn primary" id="drawer-verify">Verify (honest)</button>
        <button class="btn danger"  id="drawer-tamper">Tamper &amp; verify</button>
      </div>
      <div class="verify-out" id="drawer-verify-out"></div>
    </div>

    <div class="drawer-section">
      <h4>Merkle proof</h4>
      <div class="proof-picker">
        <label>Field
          <select id="drawer-proof-field"></select>
        </label>
        <button class="btn ghost" id="drawer-proof-load">Show path</button>
      </div>
      <div class="proof-view" id="drawer-proof-view"><em class="muted">Pick a field to inspect its walk from leaf to epoch root.</em></div>
    </div>
  </template>

  <script src="/static/js/app.js"></script>
  <script src="/static/js/autoplay.js"></script>
</body>
</html>
